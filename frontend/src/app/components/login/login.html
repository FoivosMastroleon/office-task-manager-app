<div class="login-container">
  <div class="login-card">
    <img src="assets/logo.png" alt="logo" class="login-logo" />
    <h2>Office Task Manager App</h2>
    <p>Sign in with your company Google account</p>
    <div id="googleBtn"></div>
    <div class="demo-login">
      <p>Demo login:</p>
      <button (click)="onDemoLogin('admin')">Admin</button>
      <button (click)="onDemoLogin('manager')">Manager</button>
      <button (click)="onDemoLogin('employee')">Employee</button>
    </div>
  </div>
</div>
